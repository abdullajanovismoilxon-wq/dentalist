version: '3.9'

services:
  db:
    image: postgres:16
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: dentalist_db
      POSTGRES_USER: dentalist_user
      POSTGRES_PASSWORD: dentalist1
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn backend.config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: django-insecure-!oz1#^51yg%5__@8e8u!a4)vq^90@k^&v-%d5cg=l%92vx36j)
      DB_NAME: dentalist_db
      DB_USER: dentalist_user
      DB_PASSWORD: dentalist1
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

  celery_worker:
    build: .
    command: celery -A backend.config worker -l info
    volumes:
      - .:/app
    environment:
      SECRET_KEY: django-insecure-!oz1#^51yg%5__@8e8u!a4)vq^90@k^&v-%d5cg=l%92vx36j)
      DB_NAME: dentalist_db
      DB_USER: dentalist_user
      DB_PASSWORD: dentalist1
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

  celery_beat:
    build: .
    command: celery -A backend.config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    environment:
      SECRET_KEY: django-insecure-!oz1#^51yg%5__@8e8u!a4)vq^90@k^&v-%d5cg=l%92vx36j)
      DB_NAME: dentalist_db
      DB_USER: dentalist_user
      DB_PASSWORD: dentalist1
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  static_volume:
  media_volume:
